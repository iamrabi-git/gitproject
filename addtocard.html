<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add to Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        header {
            background: #0a3d62;
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-count {
            background: #fbc531;
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
        }

        .container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .product h3 {
            margin-bottom: 10px;
        }

        .product p {
            margin-bottom: 15px;
            font-weight: bold;
        }

        .product button {
            background: #0a3d62;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        .product button:hover {
            background: #08304d;
        }

        .cart {
            margin: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
        }

        .cart h2 {
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .cart-item button {
            background: red;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        .total {
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Store</h1>
    <div>Cart: <span class="cart-count" id="cartCount">0</span></div>
</header>

<div class="container">
    <div class="product">
        <h3>Product A</h3>
        <p>Rs. 500</p>
        <button onclick="addToCart('Product A', 500)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Product B</h3>
        <p>Rs. 800</p>
        <button onclick="addToCart('Product B', 800)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Product C</h3>
        <p>Rs. 1200</p>
        <button onclick="addToCart('Product C', 1200)">Add to Cart</button>
    </div>
</div>

<div class="cart">
    <h2>Shopping Cart</h2>
    <div id="cartItems"></div>
    <div class="total">Total: Rs. <span id="totalPrice">0</span></div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push({ name, price });
        total += price;
        updateCart();
    }

    function removeFromCart(index) {
        total -= cart[index].price;
        cart.splice(index, 1);
        updateCart();
    }

    function updateCart() {
        const cartItems = document.getElementById("cartItems");
        const cartCount = document.getElementById("cartCount");
        const totalPrice = document.getElementById("totalPrice");

        cartItems.innerHTML = "";

        cart.forEach((item, index) => {
            cartItems.innerHTML += `
                <div class="cart-item">
                    <span>${item.name} - Rs. ${item.price}</span>
                    <button onclick="removeFromCart(${index})">X</button>
                </div>
            `;
        });

        cartCount.innerText = cart.length;
        totalPrice.innerText = total;
    }
</script>

</body>
</html>
